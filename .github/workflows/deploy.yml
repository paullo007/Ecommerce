name: Sync Database Schema

# Previously named "Deploy Maison Avant-Garde". The Vercel deploy step was
# removed in 2026-05 because Vercel's Git integration already auto-deploys on
# push to main — this workflow now only handles Prisma schema sync, and (on
# explicit manual trigger) re-seeding.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_seed:
        description: 'Also run seed.ts? (DESTRUCTIVE — wipes products/services/categories)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync Prisma schema to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Push schema changes to Supabase
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed database (manual opt-in only)
        if: github.event_name == 'workflow_dispatch' && inputs.run_seed == true
        run: npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
